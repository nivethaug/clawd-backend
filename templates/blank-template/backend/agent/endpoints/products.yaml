# Sample Endpoint Definition
# This file defines an endpoint that can be auto-generated by the AI agent

name: products
prefix: /api/products
tags:
  - Products

endpoints:
  - method: GET
    path: /
    operation: list
    description: List all products with optional filtering
    query_params:
      - name: category
        type: string
        required: false
        description: Filter by category
      - name: limit
        type: integer
        required: false
        default: 10
    response:
      products:
        type: array
        items:
          id: integer
          name: string
          price: number
          category: string

  - method: POST
    path: /
    operation: create
    description: Create a new product
    body:
      name:
        type: string
        required: true
      price:
        type: number
        required: true
      category:
        type: string
        required: false
    response:
      id: integer
      name: string
      price: number
      category: string

  - method: GET
    path: /{product_id}
    operation: get
    description: Get a specific product by ID
    path_params:
      - name: product_id
        type: integer
        required: true
    response:
      id: integer
      name: string
      price: number
      category: string

  - method: PUT
    path: /{product_id}
    operation: update
    description: Update a product
    path_params:
      - name: product_id
        type: integer
        required: true
    body:
      name:
        type: string
      price:
        type: number
      category:
        type: string
    response:
      id: integer
      name: string
      price: number
      category: string

  - method: DELETE
    path: /{product_id}
    operation: delete
    description: Delete a product
    path_params:
      - name: product_id
        type: integer
        required: true
    response:
      message: string
